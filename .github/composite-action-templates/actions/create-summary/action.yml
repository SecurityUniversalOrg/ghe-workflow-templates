name: Create Summary
description: Creates a standard GitHub Actions job summary.

inputs:
  title:
    description: Summary title
    required: true

  environment:
    description: Target environment
    required: false
    default: unknown

  status:
    description: Job status
    required: false
    default: unknown

runs:
  using: composite
  steps:
    - name: Write job summary
      shell: bash
      run: |
        set -euo pipefail

        {
          echo "# ${{ inputs.title }}"
          echo ""
          echo "| Field | Value |"
          echo "|---|---|"
          echo "| Repository | $GITHUB_REPOSITORY |"
          echo "| Workflow | $GITHUB_WORKFLOW |"
          echo "| Run ID | $GITHUB_RUN_ID |"
          echo "| Ref | $GITHUB_REF |"
          echo "| Actor | $GITHUB_ACTOR |"
          echo "| Environment | ${{ inputs.environment }} |"
          echo "| Status | ${{ inputs.status }} |"
          echo ""
          echo "## Notes"
          echo ""
          echo "- Review logs and artifacts for detailed output."
          echo "- This summary was generated by a reusable enterprise composite action."
        } >> "$GITHUB_STEP_SUMMARY"