name: Validate Inputs
description: Validates common enterprise workflow inputs.

inputs:
  environment:
    description: Target environment
    required: true

  allowed-environments:
    description: Comma-separated list of allowed environments
    required: false
    default: "dev,test,stage,prod"

runs:
  using: composite
  steps:
    - name: Validate environment
      shell: bash
      run: |
        set -euo pipefail

        environment="${{ inputs.environment }}"
        allowed="${{ inputs.allowed-environments }}"

        IFS=',' read -ra allowed_values <<< "$allowed"

        valid="false"
        for value in "${allowed_values[@]}"; do
          if [ "$environment" = "$value" ]; then
            valid="true"
            break
          fi
        done

        if [ "$valid" != "true" ]; then
          echo "Invalid environment: $environment"
          echo "Allowed values: $allowed"
          exit 1
        fi

        echo "Environment is valid: $environment"