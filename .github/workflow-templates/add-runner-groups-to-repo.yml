name: Add runner groups to repository

on:
  workflow_dispatch:
    inputs:
      github_host:
        description: "GitHub host (github.com or GHES hostname)"
        required: true
        default: "github.com"
        type: string

      org:
        description: "Target organization"
        required: true
        default: "SecurityUniversalOrg"
        type: string

      repo_name:
        description: "Repository name (without owner prefix)"
        required: true
        type: string

      runner_group_names_json:
        description: 'JSON array of runner group names, e.g. ["fed-testing","shared-linux"]'
        required: false
        default: '[]'
        type: string

      runner_group_ids_json:
        description: 'JSON array of runner group IDs, e.g. [12,34]'
        required: false
        default: '[]'
        type: string

permissions:
  contents: read

jobs:
  request:
    name: Validate request
    runs-on: federal

    outputs:
      github_host: ${{ steps.validate.outputs.github_host }}
      org: ${{ steps.validate.outputs.org }}
      repo_name: ${{ steps.validate.outputs.repo_name }}
      runner_group_names_json: ${{ steps.validate.outputs.runner_group_names_json }}
      runner_group_ids_json: ${{ steps.validate.outputs.runner_group_ids_json }}

    steps:
      - name: Checkout
        uses: SecurityUniversalOrg/ghe-actions/actions/checkout@v1

      - name: Validate runner group request
        id: validate
        uses: SecurityUniversalOrg/ghe-actions/actions/validate-runner-group-request@v1
        with:
          github_host: ${{ inputs.github_host }}
          org: ${{ inputs.org }}
          repo_name: ${{ inputs.repo_name }}
          runner_group_names_json: ${{ inputs.runner_group_names_json }}
          runner_group_ids_json: ${{ inputs.runner_group_ids_json }}

      - name: Print request summary
        uses: SecurityUniversalOrg/ghe-actions/actions/print-runner-group-request-summary@v1
        with:
          github_host: ${{ steps.validate.outputs.github_host }}
          org: ${{ steps.validate.outputs.org }}
          repo_name: ${{ steps.validate.outputs.repo_name }}
          runner_group_names_json: ${{ steps.validate.outputs.runner_group_names_json }}
          runner_group_ids_json: ${{ steps.validate.outputs.runner_group_ids_json }}

  apply:
    name: Approve and add runner groups
    needs: [request]
    runs-on: federal
    timeout-minutes: 30

    environment:
      name: runner-group-admin-prod

    steps:
      - name: Checkout
        uses: SecurityUniversalOrg/ghe-actions/actions/checkout@v1

      - name: Print approved request
        uses: SecurityUniversalOrg/ghe-actions/actions/print-runner-group-request-summary@v1
        with:
          github_host: ${{ needs.request.outputs.github_host }}
          org: ${{ needs.request.outputs.org }}
          repo_name: ${{ needs.request.outputs.repo_name }}
          runner_group_names_json: ${{ needs.request.outputs.runner_group_names_json }}
          runner_group_ids_json: ${{ needs.request.outputs.runner_group_ids_json }}

      - name: Add repository to runner groups
        uses: SecurityUniversalOrg/ghe-actions/actions/gh-add-repo-to-runner-groups@v1
        with:
          github_host: ${{ needs.request.outputs.github_host }}
          org: ${{ needs.request.outputs.org }}
          repo_name: ${{ needs.request.outputs.repo_name }}
          runner_group_names_json: ${{ needs.request.outputs.runner_group_names_json }}
          runner_group_ids_json: ${{ needs.request.outputs.runner_group_ids_json }}
          github_token: ${{ secrets.RUNNER_GROUP_ADMIN_TOKEN }}