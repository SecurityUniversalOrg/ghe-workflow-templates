name: Create enterprise repository

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "New repository name"
        required: true
        type: string

      description:
        description: "Repository description"
        required: false
        default: ""
        type: string

      type:
        description: "Repository type"
        required: true
        default: "app"
        type: choice
        options:
          - app
          - library
          - terraform
          - image
          - docker
          - helm
          - configuration
          - cicd

      visibility:
        description: "Repository visibility"
        required: true
        default: "private"
        type: choice
        options:
          - private
          - internal

permissions:
  contents: read

env:
  GITHUB_HOST: github.com
  GITHUB_ORG: SecurityUniversalOrg

jobs:
  request:
    name: Validate and build request
    runs-on: federal

    outputs:
      repo_name: ${{ steps.validate.outputs.repo_name }}
      repo_type: ${{ steps.validate.outputs.normalized_type }}
      description: ${{ steps.plan.outputs.description }}
      visibility: ${{ steps.plan.outputs.visibility }}
      template_repo: ${{ steps.plan.outputs.template_repo }}
      default_branch: ${{ steps.plan.outputs.default_branch }}
      auto_init: ${{ steps.plan.outputs.auto_init }}
      topics_json: ${{ steps.plan.outputs.repo_topics_json }}
      admin_teams_json: ${{ steps.plan.outputs.admin_teams_json }}
      write_teams_json: ${{ steps.plan.outputs.write_teams_json }}
      read_teams_json: ${{ steps.plan.outputs.read_teams_json }}
      ruleset_names_json: ${{ steps.plan.outputs.ruleset_names_json }}
      enable_secret_scanning: ${{ steps.plan.outputs.enable_secret_scanning }}
      enable_secret_scanning_push_protection: ${{ steps.plan.outputs.enable_secret_scanning_push_protection }}
      enable_dependabot_alerts: ${{ steps.plan.outputs.enable_dependabot_alerts }}
      enable_dependabot_security_updates: ${{ steps.plan.outputs.enable_dependabot_security_updates }}
      enable_private_vulnerability_reporting: ${{ steps.plan.outputs.enable_private_vulnerability_reporting }}
      runner_group_names_json: ${{ steps.plan.outputs.runner_group_names_json }}
      environments_json: ${{ steps.plan.outputs.environments_json }}

    steps:
      - name: Checkout
        uses: SecurityUniversalOrg/ghe-actions/actions/checkout@v1

      - name: Validate request
        id: validate
        uses: SecurityUniversalOrg/ghe-actions/actions/repo-request-validate@v1
        with:
          repo_name: ${{ inputs.repo_name }}
          repo_type: ${{ inputs.type }}
          visibility: ${{ inputs.visibility }}

      - name: Build enterprise plan
        id: plan
        uses: SecurityUniversalOrg/ghe-actions/actions/repo-request-build-enterprise-plan@v1
        with:
          repo_name: ${{ steps.validate.outputs.repo_name }}
          repo_type: ${{ steps.validate.outputs.normalized_type }}
          visibility: ${{ inputs.visibility }}
          description: ${{ inputs.description }}

      - name: "#### REVIEW - Repository Creation Plan ####"
        uses: SecurityUniversalOrg/ghe-actions/actions/repo-request-print-enterprise-plan@v1
        with:
          github_host: ${{ env.GITHUB_HOST }}
          org: ${{ env.GITHUB_ORG }}
          repo_name: ${{ steps.validate.outputs.repo_name }}
          repo_type: ${{ steps.validate.outputs.normalized_type }}
          description: ${{ steps.plan.outputs.description }}
          visibility: ${{ steps.plan.outputs.visibility }}
          template_repo: ${{ steps.plan.outputs.template_repo }}
          default_branch: ${{ steps.plan.outputs.default_branch }}
          topics_json: ${{ steps.plan.outputs.repo_topics_json }}
          admin_teams_json: ${{ steps.plan.outputs.admin_teams_json }}
          write_teams_json: ${{ steps.plan.outputs.write_teams_json }}
          read_teams_json: ${{ steps.plan.outputs.read_teams_json }}
          ruleset_names_json: ${{ steps.plan.outputs.ruleset_names_json }}
          runner_group_names_json: ${{ steps.plan.outputs.runner_group_names_json }}
          environments_json: ${{ steps.plan.outputs.environments_json }}

  approve-and-apply:
    name: Create and configure repository
    needs: [request]
    runs-on: federal
    environment:
      name: repo-create-prod
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: SecurityUniversalOrg/ghe-actions/actions/checkout@v1

      - name: Create repository from template
        id: create
        uses: SecurityUniversalOrg/ghe-actions/actions/gh-create-repo-from-template@v1
        with:
          github_host: ${{ env.GITHUB_HOST }}
          org: ${{ env.GITHUB_ORG }}
          repo_name: ${{ needs.request.outputs.repo_name }}
          description: ${{ needs.request.outputs.description }}
          visibility: ${{ needs.request.outputs.visibility }}
          template_repo: ${{ needs.request.outputs.template_repo }}
          default_branch: ${{ needs.request.outputs.default_branch }}
          auto_init: ${{ needs.request.outputs.auto_init }}
          github_token: ${{ secrets.ORG_ADMIN_TOKEN }}

      - name: Configure baseline repository settings
        uses: SecurityUniversalOrg/ghe-actions/actions/gh-configure-new-repo@v1
        with:
          github_host: ${{ env.GITHUB_HOST }}
          org: ${{ env.GITHUB_ORG }}
          repo_name: ${{ needs.request.outputs.repo_name }}
          topics_json: ${{ needs.request.outputs.topics_json }}
          default_branch: ${{ needs.request.outputs.default_branch }}
          github_token: ${{ secrets.ORG_ADMIN_TOKEN }}

      - name: Assign repository teams
        uses: SecurityUniversalOrg/ghe-actions/actions/gh-assign-repo-teams@v1
        with:
          github_host: ${{ env.GITHUB_HOST }}
          org: ${{ env.GITHUB_ORG }}
          repo_name: ${{ needs.request.outputs.repo_name }}
          admin_teams_json: ${{ needs.request.outputs.admin_teams_json }}
          write_teams_json: ${{ needs.request.outputs.write_teams_json }}
          read_teams_json: ${{ needs.request.outputs.read_teams_json }}
          github_token: ${{ secrets.ORG_ADMIN_TOKEN }}

      - name: Add repo to org rulesets
        uses: SecurityUniversalOrg/ghe-actions/actions/gh-add-repo-to-rulesets-by-name@v1
        with:
          github_host: ${{ env.GITHUB_HOST }}
          org: ${{ env.GITHUB_ORG }}
          repo_name: ${{ needs.request.outputs.repo_name }}
          ruleset_names_json: ${{ needs.request.outputs.ruleset_names_json }}
          github_token: ${{ secrets.RULESET_ADMIN_TOKEN }}

      - name: Add repo to runner groups
        uses: SecurityUniversalOrg/ghe-actions/actions/gh-add-repo-to-runner-groups@v1
        with:
          github_host: ${{ env.GITHUB_HOST }}
          org: ${{ env.GITHUB_ORG }}
          repo_name: ${{ needs.request.outputs.repo_name }}
          runner_group_names_json: ${{ needs.request.outputs.runner_group_names_json }}
          github_token: ${{ secrets.RUNNER_GROUP_ADMIN_TOKEN }}

      - name: Create repository environments
        uses: SecurityUniversalOrg/ghe-actions/actions/gh-create-repo-environments@v1
        with:
          github_host: ${{ env.GITHUB_HOST }}
          org: ${{ env.GITHUB_ORG }}
          repo_name: ${{ needs.request.outputs.repo_name }}
          environments_json: ${{ needs.request.outputs.environments_json }}
          github_token: ${{ secrets.RULESET_ADMIN_TOKEN }}

      - name: Print final audit summary
        uses: SecurityUniversalOrg/ghe-actions/actions/repo-request-print-final-summary@v1
        with:
          github_host: ${{ env.GITHUB_HOST }}
          org: ${{ env.GITHUB_ORG }}
          repo_name: ${{ needs.request.outputs.repo_name }}
          repo_type: ${{ needs.request.outputs.repo_type }}
          repo_url: ${{ steps.create.outputs.html_url }}
          visibility: ${{ needs.request.outputs.visibility }}
          template_repo: ${{ needs.request.outputs.template_repo }}
          default_branch: ${{ needs.request.outputs.default_branch }}
          topics_json: ${{ needs.request.outputs.topics_json }}
          admin_teams_json: ${{ needs.request.outputs.admin_teams_json }}
          write_teams_json: ${{ needs.request.outputs.write_teams_json }}
          read_teams_json: ${{ needs.request.outputs.read_teams_json }}
          ruleset_names_json: ${{ needs.request.outputs.ruleset_names_json }}
          runner_group_names_json: ${{ needs.request.outputs.runner_group_names_json }}
          environments_json: ${{ needs.request.outputs.environments_json }}