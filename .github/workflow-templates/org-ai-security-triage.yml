name: Org AI Security Triage

on:
  workflow_dispatch:
    inputs:
      repos_csv:
        description: Path to CSV containing repositories to scan
        required: false
        default: config/repos.csv

      model:
        description: Copilot model to use
        required: false
        default: claude-opus-4.7

      create_issues:
        description: Create mitigation issues in scanned repositories
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      upload_sarif:
        description: Upload generated SARIF to scanned repositories
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

  schedule:
    - cron: "30 7 * * 1"

permissions:
  contents: write
  pull-requests: write
  actions: read

env:
  GITHUB_API_URL: https://api.github.com
  GITHUB_WEB_URL: https://github.com
  REPORT_BRANCH_PREFIX: ai-security-triage

jobs:
  build-matrix:
    name: Build repository matrix
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Checkout central repo
        uses: actions/checkout@v4

      - name: Build repository matrix from CSV
        id: matrix
        uses: SecurityUniversalOrg/ghe-actions/actions/build-repo-matrix@v1
        with:
          repos-csv: ${{ inputs.repos_csv || 'config/repos.csv' }}

  scan-repositories:
    name: Scan ${{ matrix.owner }}/${{ matrix.repo }}
    runs-on: ubuntu-latest
    needs: build-matrix

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    steps:
      - name: Checkout central workflow repo
        uses: actions/checkout@v4
        with:
          path: central-repo

      - name: Checkout target repository
        id: checkout-target
        uses: SecurityUniversalOrg/ghe-actions/actions/checkout-target-repo@v1
        with:
          token: ${{ secrets.ORG_SECURITY_TOKEN }}
          owner: ${{ matrix.owner }}
          repo: ${{ matrix.repo }}
          ref: ${{ matrix.default_branch }}
          path: scanned-source
          github-web-url: ${{ env.GITHUB_WEB_URL }}

      - name: Export GitHub security alerts
        id: export-alerts
        uses: SecurityUniversalOrg/ghe-actions/actions/gh-export-security-alerts@v1
        with:
          token: ${{ secrets.ORG_SECURITY_TOKEN }}
          owner: ${{ matrix.owner }}
          repo: ${{ matrix.repo }}
          output-directory: workspace/security-results
          github-api-url: ${{ env.GITHUB_API_URL }}

      - name: Build static environment context
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p workspace/ai

          jq -n \
            --arg owner "${{ matrix.owner }}" \
            --arg repo "${{ matrix.repo }}" \
            --arg default_branch "${{ matrix.default_branch }}" \
            --arg business_owner "${{ matrix.business_owner }}" \
            --arg development_exec "${{ matrix.development_exec }}" \
            --arg cloud_platform "${{ matrix.cloud_platform }}" \
            --arg internet_facing "${{ matrix.internet_facing }}" \
            '{
              repository: {
                owner: $owner,
                name: $repo,
                full_name: ($owner + "/" + $repo),
                default_branch: $default_branch
              },
              business_context: {
                business_owner: $business_owner,
                development_exec: $development_exec
              },
              environment: {
                internet_facing: ($internet_facing | ascii_downcase == "true"),
                cloud_platform: $cloud_platform
              },
              source_context: {
                note: "Temporary static context. Replace later with ServiceNow CMDB/SNOW API calls."
              }
            }' > workspace/ai/env-context.json

      - name: Install Copilot CLI
        run: npm install -g @github/copilot
      
      - name: Run Copilot security analysis
        id: ai-analysis
        uses: SecurityUniversalOrg/ghe-actions/actions/copilot-security-analysis@v1
        with:
          copilot-github-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          model: ${{ inputs.model || 'claude-opus-4.7' }}
          source-directory: scanned-source
          security-results-directory: workspace/security-results
          env-context-file: workspace/ai/env-context.json
          output-directory: workspace/ai
          sarif-output-file: copilot-new-findings.sarif
          mitigation-output-file: mitigation-report.md
          triage-output-file: ai-triage.json

      - name: Upload AI SARIF to scanned repo
        if: ${{ inputs.upload_sarif == 'true' }}
        uses: ./central-repo/.github/actions/upload-sarif-api
        with:
          token: ${{ secrets.ORG_SECURITY_TOKEN }}
          owner: ${{ matrix.owner }}
          repo: ${{ matrix.repo }}
          ref: refs/heads/${{ matrix.default_branch }}
          commit-sha: ${{ steps.checkout-target.outputs.commit-sha }}
          sarif-file: ${{ steps.ai-analysis.outputs.sarif-file }}
          github-api-url: ${{ env.GITHUB_API_URL }}

      - name: Create mitigation issue in scanned repo
        if: ${{ inputs.create_issues == 'true' }}
        id: create-issue
        uses: ./central-repo/.github/actions/create-mitigation-issue
        with:
          token: ${{ secrets.ORG_SECURITY_TOKEN }}
          owner: ${{ matrix.owner }}
          repo: ${{ matrix.repo }}
          title-prefix: AI-assisted security triage
          mitigation-report-file: ${{ steps.ai-analysis.outputs.mitigation-report-file }}
          ai-triage-file: ${{ steps.ai-analysis.outputs.ai-triage-file }}
          github-api-url: ${{ env.GITHUB_API_URL }}

      - name: Summarize repository findings
        id: summary
        uses: ./central-repo/.github/actions/summarize-repo-findings
        with:
          owner: ${{ matrix.owner }}
          repo: ${{ matrix.repo }}
          default-branch: ${{ matrix.default_branch }}
          commit-sha: ${{ steps.checkout-target.outputs.commit-sha }}
          security-results-directory: workspace/security-results
          ai-triage-file: ${{ steps.ai-analysis.outputs.ai-triage-file }}
          sarif-file: ${{ steps.ai-analysis.outputs.sarif-file }}
          mitigation-report-file: ${{ steps.ai-analysis.outputs.mitigation-report-file }}
          issue-url: ${{ steps.create-issue.outputs.issue-url }}
          output-directory: workspace/final-report

      - name: Upload repository report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.summary.outputs.artifact-name }}
          path: workspace/final-report/
          retention-days: 30

  central-report-pr:
    name: Update central reports and open PR
    runs-on: ubuntu-latest
    needs:
      - scan-repositories

    steps:
      - name: Checkout central repo
        uses: actions/checkout@v4
        with:
          path: central-repo
          token: ${{ secrets.ORG_SECURITY_TOKEN }}

      - name: Download repository report artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-reports

      - name: Update org_findings.csv and reports directory
        uses: ./central-repo/.github/actions/update-org-findings
        with:
          central-repo-path: central-repo
          downloaded-reports-path: downloaded-reports
          org-findings-file: org_findings.csv
          reports-directory: reports

      - name: Create central reporting PR
        uses: ./central-repo/.github/actions/create-central-report-pr
        with:
          token: ${{ secrets.ORG_SECURITY_TOKEN }}
          central-repo-path: central-repo
          branch-prefix: ${{ env.REPORT_BRANCH_PREFIX }}
          commit-message: Update AI security triage reports
          pr-title: Update AI security triage reports
          pr-body: |
            This PR updates repository-level AI security triage reports, exported GitHub security alert JSON files, generated SARIF files, mitigation reports, and the org_findings.csv rollup.